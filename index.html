  <meta charset="UTF-8" />

  <title>SecureChat</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #313338;
      --sidebar:  #2b2d31;
      --border:   #1e1f22;
      --hover:    #35373c;
      --selected: #404249;
      --input-bg: #383a40;
      --text:     #dbdee1;
      --muted:    #80848e;
      --header:   #f2f3f5;
      --blurple:  #5865f2;
      --blurple-h:#4752c4;
      --green:    #23a55a;
      --panel:    #232428;
      --font: 'Noto Sans KR', sans-serif;
      --r: 4px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font); background:var(--bg); color:var(--text); height:100vh; overflow:hidden; display:flex; }

    /* ── LOGIN ── */
    #login-screen {
      position:fixed; inset:0; z-index:200;
      background:#1e1f22;
      display:flex; align-items:center; justify-content:center;
    }
    .login-box {
      background:#313338; border-radius:8px; padding:32px;
      width:480px; box-shadow:0 8px 32px rgba(0,0,0,.7);
      animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
    .login-title { font-size:24px;font-weight:700;color:var(--header);text-align:center;margin-bottom:4px; }
    .login-sub   { font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px; }

    .av-section { display:flex;align-items:center;gap:20px;margin-bottom:20px; }
    .av-preview {
      width:72px;height:72px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:30px;cursor:pointer;flex-shrink:0;
      border:3px solid transparent;transition:filter .15s;position:relative;
    }
    .av-preview:hover{filter:brightness(1.15);}
    .av-preview::after {
      content:'✏️';position:absolute;bottom:-2px;right:-2px;
      background:var(--blurple);border-radius:50%;width:22px;height:22px;
      font-size:11px;display:flex;align-items:center;justify-content:center;
      border:2px solid #313338;
    }
    .av-grid { display:flex;flex-wrap:wrap;gap:7px; }
    .av-opt {
      width:34px;height:34px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:16px;cursor:pointer;
      border:2px solid transparent;transition:all .15s;
    }
    .av-opt:hover{transform:scale(1.18);}
    .av-opt.sel{border-color:var(--blurple);box-shadow:0 0 0 3px rgba(88,101,242,.35);}

    .lbl { display:block;font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:6px; }
    .dc-input {
      width:100%;background:#1e1f22;border:1px solid #1e1f22;border-radius:var(--r);
      color:var(--text);font-family:var(--font);font-size:15px;padding:10px 12px;outline:none;transition:border-color .15s;
    }
    .dc-input:focus{border-color:var(--blurple);}
    .fl  { display:flex;flex-direction:column;gap:14px;flex:1; }
    .row { display:flex;gap:8px; }
    .row input{flex:1;}
    .btn-sm {
      background:var(--hover);border:none;border-radius:var(--r);color:var(--text);
      font-family:var(--font);font-size:13px;padding:0 12px;cursor:pointer;white-space:nowrap;transition:background .15s;
    }
    .btn-sm:hover{background:var(--selected);}
    .btn-join {
      width:100%;margin-top:8px;padding:12px;
      background:var(--blurple);color:#fff;font-family:var(--font);font-size:15px;font-weight:700;
      border:none;border-radius:var(--r);cursor:pointer;transition:background .15s;
    }
    .btn-join:hover:not(:disabled){background:var(--blurple-h);}
    .btn-join:disabled{opacity:.5;cursor:not-allowed;}
    .kg-row{display:flex;align-items:center;gap:8px;margin-top:4px;font-size:12px;color:var(--muted);}
    .spin{width:12px;height:12px;border-radius:50%;border:2px solid var(--muted);border-top-color:var(--blurple);animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .enc-note{margin-top:14px;background:rgba(88,101,242,.1);border:1px solid rgba(88,101,242,.25);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--muted);line-height:1.7;text-align:center;}
    .enc-note strong{color:#7289da;}

    /* ── APP ── */
    #app { display:none; width:100%; height:100vh; }

    /* ── Sidebar (members only, no channels) ── */
    .sidebar {
      width:240px; background:var(--sidebar);
      display:flex; flex-direction:column; flex-shrink:0;
    }
    .sb-header {
      height:48px; padding:0 16px;
      display:flex; align-items:center; justify-content:space-between;
      border-bottom:1px solid var(--border);
      font-size:15px; font-weight:700; color:var(--header); flex-shrink:0;
    }

    /* Members list */
    .mp-title {
      font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
      color:var(--muted);padding:16px 16px 8px;
    }
    #mb-list { flex:1; overflow-y:auto; padding:0 4px; }
    #mb-list::-webkit-scrollbar{width:4px;}
    #mb-list::-webkit-scrollbar-thumb{background:var(--border);}

    .mb-row {
      display:flex;align-items:center;gap:10px;
      padding:6px 12px;border-radius:var(--r);cursor:pointer;transition:background .1s;
    }
    .mb-row:hover{background:var(--hover);}
    .mb-av {
      width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;
      position:relative;
    }
    .mb-dot {
      position:absolute;bottom:-1px;right:-1px;
      width:10px;height:10px;border-radius:50%;
      border:2px solid var(--sidebar);background:var(--green);
    }
    .mb-info{flex:1;min-width:0;}
    .mb-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .mb-sub{font-size:11px;color:var(--muted);}

    /* User panel */
    .up{height:52px;background:var(--panel);display:flex;align-items:center;padding:0 8px;gap:8px;flex-shrink:0;}
    .up-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;position:relative;}
    .up-dot{position:absolute;bottom:-1px;right:-1px;width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--panel);}
    .up-info{flex:1;min-width:0;}
    .up-name{font-size:13px;font-weight:600;color:var(--header);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .up-status{font-size:11px;color:var(--muted);}

    /* ── Main ── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

    .ch-hdr{
      height:48px;background:var(--bg);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;
    }
    .ch-hdr-name{font-size:15px;font-weight:700;color:var(--header);}
    .ch-hdr-div{width:1px;height:20px;background:var(--border);}
    .ch-hdr-desc{font-size:13px;color:var(--muted);}
    .ch-hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;}
    .enc-chip{
      display:flex;align-items:center;gap:5px;
      background:rgba(35,165,90,.15);border:1px solid rgba(35,165,90,.3);
      border-radius:12px;padding:3px 10px;font-size:11px;color:var(--green);font-weight:700;
    }

    /* ── Messages ── */
    #messages{
      flex:1; overflow-y:auto; padding:8px 0;
      display:flex; flex-direction:column;
    }
    #messages::-webkit-scrollbar{width:8px;}
    #messages::-webkit-scrollbar-thumb{background:#1a1b1e;border-radius:4px;}

    .sys-msg{
      display:flex;align-items:center;gap:8px;
      padding:4px 16px;margin:4px 0;font-size:12px;color:var(--muted);
    }
    .sys-line{flex:1;height:1px;background:var(--border);}

    /* 새 발신자 그룹: 위에 여백 줌 */
    .msg-group      { padding:1px 16px; display:flex; gap:16px; transition:background .05s; }
    .msg-group:hover{ background:rgba(0,0,0,.07); }
    .msg-group.new-sender { padding-top:16px; }   /* ← 새 발신자일 때만 위 여백 */

    .msg-av-col   { width:40px; flex-shrink:0; }
    .msg-av {
      width:40px; height:40px; border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:20px;cursor:pointer;transition:filter .1s;user-select:none;
    }
    .msg-av:hover{filter:brightness(1.12);}

    /* compact용 타임스탬프 */
    .ts-compact{
      width:40px; font-size:10px; color:transparent;
      text-align:right; padding-top:3px; line-height:1;
      transition:color .1s; flex-shrink:0;
    }
    .msg-group:hover .ts-compact{ color:var(--muted); }

    .msg-body  { flex:1; min-width:0; }
    .msg-hdr   { display:flex; align-items:baseline; gap:8px; margin-bottom:2px; }
    .msg-name  { font-size:15px; font-weight:600; cursor:pointer; }
    .msg-name:hover{ text-decoration:underline; }
    .msg-time  { font-size:11px; color:var(--muted); }
    .msg-ebadge{ font-size:10px; background:rgba(88,101,242,.15); border-radius:3px; padding:1px 5px; color:#7289da; font-weight:700; }
    .msg-content{ font-size:15px; line-height:1.55; color:var(--text); word-break:break-word; }

    /* ── Input ── */
    .input-bar { padding:0 16px 24px; flex-shrink:0; }

    .char-counter {
      text-align:right; font-size:11px; color:var(--muted);
      margin-bottom:4px; transition:color .15s;
    }
    .char-counter.warn  { color:var(--blurple); }
    .char-counter.limit { color:#f23f42; font-weight:700; }

    .input-wrap{
      background:var(--input-bg); border-radius:8px;
      display:flex; align-items:flex-end; padding:0 12px;
    }
    #msg-input{
      flex:1; background:none; border:none; outline:none;
      color:var(--text); font-family:var(--font); font-size:15px;
      padding:11px 8px; resize:none;
      min-height:44px; max-height:200px; line-height:1.5;
    }
    #msg-input::placeholder{ color:var(--muted); }
    .send-btn{
      background:none; border:none; color:var(--muted);
      cursor:pointer; padding:11px 4px; font-size:21px;
      display:flex; align-items:center; transition:color .15s;
    }
    .send-btn:hover,.send-btn.act{ color:var(--blurple); }

    /* ── Popover ── */
    .popover{
      position:fixed; z-index:300; background:#111214;
      border-radius:8px; width:260px; overflow:hidden;
      box-shadow:0 8px 24px rgba(0,0,0,.85);
      animation:fadeIn .15s ease; pointer-events:none;
    }
    @keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    .pop-banner{ height:60px; }
    .pop-body  { padding:0 16px 16px; }
    .pop-av-wrap{ margin-top:-24px; margin-bottom:10px; }
    .pop-av{
      width:68px;height:68px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:32px;border:5px solid #111214;
    }
    .pop-name{ font-size:18px;font-weight:800;color:#f2f3f5; }
    .pop-tag { font-size:12px;color:var(--muted);margin-bottom:10px; }
    .pop-div { height:1px;background:#2b2d31;margin:10px 0; }
    .pop-lbl { font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-bottom:4px; }
    .pop-key { font-size:9px;color:var(--muted);word-break:break-all;line-height:1.6;background:#1e1f22;border-radius:4px;padding:6px 8px;max-height:70px;overflow:hidden; }

    /* ── Toast ── */
    #toast{
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(12px);
      background:#111214;border:1px solid #3f4147;border-radius:8px;
      padding:10px 18px;font-size:13px;color:var(--text);
      opacity:0;transition:all .25s;pointer-events:none;z-index:999;
      box-shadow:0 4px 16px rgba(0,0,0,.5);white-space:nowrap;
    }
    #toast.show{ opacity:1;transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- ══ LOGIN ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">SecureChat 입장</div>
    <div class="login-sub">종단간 암호화 메신저 · RSA-2048 + AES-256</div>

    <div class="av-section">

    <button class="btn-join" id="join-btn" onclick="joinChat()" disabled>입장하기</button>
    <div class="enc-note">🔒 <strong>종단간 암호화</strong> — 서버는 메시지 내용을 볼 수 없습니다</div>
  </div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- Sidebar: 멤버 목록만 -->
  <div class="sidebar">
    <div class="sb-header">
      <span id="room-label">SecureChat</span>
      <div class="enc-chip" style="font-size:10px;padding:2px 8px;">🔒 E2E</div>
    </div>

    <div class="mp-title">온라인 — <span id="mc">0</span>명</div>

    <div class="up">

  <!-- Main -->
  <div class="main">

    <div class="ch-hdr">
      <span style="font-size:20px;color:var(--muted)">#</span>
      <span class="ch-hdr-name" id="chan-name-hdr">general</span>
      <div class="ch-hdr-div"></div>
      <span class="ch-hdr-desc">종단간 암호화 채팅</span>
      <div class="ch-hdr-r">
        <div class="enc-chip">🔒 E2E 암호화</div>
      </div>
    </div>

    <!-- 메시지 목록 -->
    <div id="messages">
      <div class="sys-msg">
        <div class="sys-line"></div>
        <span>🔐 이 채널의 모든 메시지는 종단간 암호화됩니다</span>
        <div class="sys-line"></div>
      </div>
    </div>

    <!-- 입력창 -->
    <div class="input-bar">
      <div class="char-counter" id="char-counter">0 / 200</div>
      <div class="input-wrap">
        <textarea
          id="msg-input"
          rows="1"
          maxlength="200"
          placeholder="메시지 보내기 (Enter 전송 · Shift+Enter 줄바꿈)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<div class="popover" id="popover" style="display:none"></div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════
//  CONFIG
// ═══════════════════════════════════
const AVATARS = ['🐱','🐶','🦊','🐻','🐼','🦁','🐯','🦄','🐸','🐺','🐷','🐨','🦋','🐙','🦖','🤖'];
const BG      = ['#5865f2','#eb459e','#57f287','#fee75c','#ed4245','#3498db','#e67e22','#9b59b6','#1abc9c','#e74c3c','#2ecc71','#f39c12','#16a085','#8e44ad','#2980b9','#c0392b'];
const TC      = ['#fff','#fff','#1a1a1a','#2c2f33','#fff','#fff','#fff','#fff','#fff','#fff','#1a1a1a','#2c2f33','#fff','#fff','#fff','#fff'];
const MAX_CHARS = 200;

let selIdx = 0;
let myKeyPair = null, myPubPem = '', myPriv = null;
let ws = null, myUser = '', myRoom = '';
let profiles  = {};   // username -> { avatar, bg, tc, pubPem, _key }
let lastSender = null;

// ── Avatar grid ──
const grid = document.getElementById('av-grid');
const prev = document.getElementById('av-preview');
prev.style.background = BG[0]; prev.style.color = TC[0];

AVATARS.forEach((av, i) => {
  const d = document.createElement('div');
  d.className = 'av-opt' + (i===0 ? ' sel' : '');
  d.textContent = av; d.style.background = BG[i]; d.title = av;
  d.onclick = () => {
    selIdx = i;
    prev.textContent = av; prev.style.background = BG[i]; prev.style.color = TC[i];
    document.querySelectorAll('.av-opt').forEach((e,j) => e.classList.toggle('sel', j===i));
  };
  grid.appendChild(d);
});

function cycleAvatar() {
  selIdx = (selIdx + 1) % AVATARS.length;
  prev.textContent = AVATARS[selIdx];
  prev.style.background = BG[selIdx]; prev.style.color = TC[selIdx];
  document.querySelectorAll('.av-opt').forEach((e,i) => e.classList.toggle('sel', i===selIdx));
}

function generateRoomId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id = ''; for (let i=0;i<8;i++) id += c[Math.floor(Math.random()*c.length)];
  document.getElementById('room-input').value = id;
}

// ═══════════════════════════════════
//  CRYPTO
// ═══════════════════════════════════
const S = crypto.subtle;
const genRSA = () => S.generateKey({name:'RSA-OAEP',modulusLength:2048,publicExponent:new Uint8Array([1,0,1]),hash:'SHA-256'},true,['encrypt','decrypt']);
const exportPem = async key => {
  const b64 = btoa(String.fromCharCode(...new Uint8Array(await S.exportKey('spki',key))));
  return `-----BEGIN PUBLIC KEY-----\n${b64.match(/.{1,64}/g).join('\n')}\n-----END PUBLIC KEY-----`;
};
const importPem = pem => S.importKey('spki',Uint8Array.from(atob(pem.replace(/-----[^-]+-----/g,'').replace(/\s+/g,'')),c=>c.charCodeAt(0)),{name:'RSA-OAEP',hash:'SHA-256'},false,['encrypt']);
const genAES   = () => S.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
const encAESKey = async (aes,rsa) => btoa(String.fromCharCode(...new Uint8Array(await S.encrypt({name:'RSA-OAEP'},rsa,await S.exportKey('raw',aes)))));
const encText   = async (text,aes) => {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  return { ciphertext:btoa(String.fromCharCode(...new Uint8Array(await S.encrypt({name:'AES-GCM',iv},aes,new TextEncoder().encode(text))))), iv:btoa(String.fromCharCode(...iv)) };
};
const decAESKey = async (b64,priv) => S.importKey('raw',await S.decrypt({name:'RSA-OAEP'},priv,Uint8Array.from(atob(b64),c=>c.charCodeAt(0))),{name:'AES-GCM',length:256},false,['decrypt']);
const decText   = async (enc,aes) => new TextDecoder().decode(await S.decrypt({name:'AES-GCM',iv:Uint8Array.from(atob(enc.iv),c=>c.charCodeAt(0))},aes,Uint8Array.from(atob(enc.ciphertext),c=>c.charCodeAt(0))));

(async () => {
  myKeyPair = await genRSA();
  myPriv = myKeyPair.privateKey;
  myPubPem = await exportPem(myKeyPair.publicKey);
  document.getElementById('kg-status').innerHTML = `<span style="color:var(--green)">✓</span><span> RSA-2048 키 생성 완료</span>`;
  document.getElementById('join-btn').disabled = false;
})();

// ═══════════════════════════════════
//  UI UTILS
// ═══════════════════════════════════
function toast(msg, ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
function fmtTime(iso) { return new Date(iso).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }
function getP(u) { return profiles[u] || { avatar:'❓', bg:'#5865f2', tc:'#fff', pubPem:'' }; }

// ── 멤버 목록 갱신 ──
function refreshMembers() {
  const list = document.getElementById('mb-list');
  const mc   = document.getElementById('mc');
  const all  = [myUser, ...Object.keys(profiles).filter(u => u !== myUser)];
  mc.textContent = all.length;
  list.innerHTML = '';
  all.forEach(u => {
    const p = getP(u); const isMe = u === myUser;
    const d = document.createElement('div'); d.className = 'mb-row';
    d.innerHTML = `
      <div class="mb-av" style="background:${p.bg};color:${p.tc}">
        ${p.avatar}<div class="mb-dot"></div>
      </div>
      <div class="mb-info">
        <div class="mb-name">${esc(u)}${isMe ? ' <span style="font-size:10px;color:var(--muted)">(나)</span>' : ''}</div>
        <div class="mb-sub">🔒 E2E</div>
      </div>`;
    d.onclick = e => showPop(u, e);
    list.appendChild(d);
  });
}

// ── Popover ──
let popTimer;
function showPop(u, e) {
  const p = getP(u);
  const pop = document.getElementById('popover');
  const keySnip = p.pubPem
    ? p.pubPem.replace(/-----[^-]+-----/g,'').replace(/\s+/g,'').substring(0,80) + '…'
    : '키 없음';
  pop.innerHTML = `
    <div class="pop-banner" style="background:linear-gradient(135deg,${p.bg}99,${p.bg}22)"></div>
    <div class="pop-body">
      <div class="pop-av-wrap"><div class="pop-av" style="background:${p.bg};color:${p.tc}">${p.avatar}</div></div>
      <div class="pop-name">${esc(u)}</div>
      <div class="pop-tag">#${u.toLowerCase().replace(/\s/g,'_')} · 온라인</div>
      <div class="pop-div"></div>
      <div class="pop-lbl">공개키 (RSA-2048)</div>
      <div class="pop-key">${keySnip}</div>
    </div>`;
  const r = e.currentTarget.getBoundingClientRect();
  let left = r.right + 8, top = r.top;
  if (left + 270 > window.innerWidth)  left = r.left - 278;
  if (top  + 320 > window.innerHeight) top  = window.innerHeight - 325;
  pop.style.cssText = `display:block;left:${left}px;top:${top}px;`;
  clearTimeout(popTimer);
  popTimer = setTimeout(() => pop.style.display='none', 4500);
}
document.addEventListener('click', e => {
  if (!e.target.closest('.msg-av,.msg-name,.mb-row')) document.getElementById('popover').style.display='none';
});

// ── 시스템 메시지 ──
function addSys(text) {
  const m = document.getElementById('messages');
  const d = document.createElement('div'); d.className='sys-msg';
  d.innerHTML = `<div class="sys-line"></div><span>${esc(text)}</span><div class="sys-line"></div>`;
  m.appendChild(d); lastSender = null; m.scrollTop = m.scrollHeight;
}

// ── 채팅 메시지 ──
// 같은 사람이 연속으로 보낸 메시지: 아바타/이름 숨기고 위 여백 없음
// 새 사람이 보낸 메시지: 아바타+이름 표시 + 위에 16px 여백
function addMsg({ from, text, ts }) {
  const m    = document.getElementById('messages');
  const p    = getP(from);
  const isNew = lastSender !== from;   // 새 발신자 여부
  lastSender = from;
  const time = fmtTime(ts || new Date().toISOString());

  const g = document.createElement('div');
  g.className = 'msg-group' + (isNew ? ' new-sender' : '');

  if (isNew) {
    // 아바타 컬럼
    const ac = document.createElement('div'); ac.className='msg-av-col';
    const av = document.createElement('div'); av.className='msg-av';
    av.textContent = p.avatar;
    av.style.cssText = `background:${p.bg};color:${p.tc};`;
    av.onclick = e => showPop(from, e);
    ac.appendChild(av);
    g.appendChild(ac);

    // 본문
    const b = document.createElement('div'); b.className='msg-body';
    b.innerHTML = `
      <div class="msg-hdr">
        <span class="msg-name" style="color:${p.bg}"
          onclick="showPop('${esc(from).replace(/'/g,"\\'")}', event)">${esc(from)}</span>
        <span class="msg-time">오늘 ${time}</span>
        <span class="msg-ebadge">🔒 E2E</span>
      </div>
      <div class="msg-content">${esc(text)}</div>`;
    g.appendChild(b);

  } else {
    // 연속 메시지: 타임스탬프(hover시 표시) + 내용만
    const ts2 = document.createElement('div'); ts2.className='ts-compact'; ts2.textContent=time;
    g.appendChild(ts2);
    const b = document.createElement('div'); b.className='msg-body';
    b.innerHTML = `<div class="msg-content">${esc(text)}</div>`;
    g.appendChild(b);
  }

  m.appendChild(g); m.scrollTop = m.scrollHeight;
}

function showPop(u, e) {
  // e might be a string from inline onclick - handle both
  if (typeof e === 'string') return; // safety
  const p = getP(u);
  const pop = document.getElementById('popover');
  const keySnip = p.pubPem
    ? p.pubPem.replace(/-----[^-]+-----/g,'').replace(/\s+/g,'').substring(0,80) + '…'
    : '키 없음';
  pop.innerHTML = `
    <div class="pop-banner" style="background:linear-gradient(135deg,${p.bg}99,${p.bg}22)"></div>
    <div class="pop-body">
      <div class="pop-av-wrap"><div class="pop-av" style="background:${p.bg};color:${p.tc}">${p.avatar}</div></div>
      <div class="pop-name">${esc(u)}</div>
      <div class="pop-tag">#${u.toLowerCase().replace(/\s/g,'_')} · 온라인</div>
      <div class="pop-div"></div>
      <div class="pop-lbl">공개키 (RSA-2048)</div>
      <div class="pop-key">${keySnip}</div>
    </div>`;
  const cx = e.clientX || (e.currentTarget?.getBoundingClientRect().right + 8) || 200;
  const cy = e.clientY || (e.currentTarget?.getBoundingClientRect().top) || 200;
  let left = cx + 8, top = cy;
  if (left + 270 > window.innerWidth)  left = cx - 278;
  if (top  + 320 > window.innerHeight) top  = window.innerHeight - 325;
  pop.style.cssText = `display:block;left:${left}px;top:${top}px;`;
  clearTimeout(popTimer);
  popTimer = setTimeout(() => pop.style.display='none', 4500);
}

// ═══════════════════════════════════
//  WEBSOCKET
// ═══════════════════════════════════
function showLoginError(msg) {
  let el = document.getElementById('login-error');
  if (!el) {
    el = document.createElement('div');
    el.id = 'login-error';
    el.style.cssText = `
      margin-top:10px; padding:10px 14px; border-radius:4px;
      background:rgba(242,63,66,.12); border:1px solid rgba(242,63,66,.4);
      font-size:13px; color:#f23f42; line-height:1.6; white-space:pre-line;
    `;
    document.querySelector('.btn-join').insertAdjacentElement('afterend', el);
  }
  el.textContent = msg;
  el.style.display = 'block';
}

async function joinChat() {
  // 에러 메시지 숨기기
  const errEl = document.getElementById('login-error');
  if (errEl) errEl.style.display = 'none';
  const user = document.getElementById('username-input').value.trim();
  const room = document.getElementById('room-input').value.trim();
  const srv  = document.getElementById('server-input').value.trim();
  if (!user) { toast('닉네임을 입력해주세요'); return; }

  myUser = user;
  myRoom = room || Math.random().toString(36).substr(2,8).toUpperCase();
  profiles[myUser] = { avatar:AVATARS[selIdx], bg:BG[selIdx], tc:TC[selIdx], pubPem:myPubPem };

  try { ws = new WebSocket(srv); }
  catch(e) { toast('서버 주소가 잘못됐습니다'); return; }

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type:'join', username:myUser, room_id:myRoom, public_key:myPubPem,
      profile:{ avatar:AVATARS[selIdx], bgColor:BG[selIdx], textColor:TC[selIdx] }
    }));

    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='flex';

    document.getElementById('room-label').textContent    = `Room: ${myRoom}`;
    document.getElementById('chan-name-hdr').textContent = myRoom.toLowerCase();

    const upAv = document.getElementById('up-av-el');
    upAv.style.background = BG[selIdx]; upAv.style.color = TC[selIdx];
    upAv.innerHTML = AVATARS[selIdx] + '<div class="up-dot"></div>';
    document.getElementById('up-name-el').textContent = myUser;

    refreshMembers();
    toast(`🔐 ${myRoom} 방 입장!`);
  };

  ws.onmessage = async ev => {
    const d = JSON.parse(ev.data);

    if (d.type === 'error') {
      const MSG = {
        'IP_ALREADY_REGISTERED': `이 IP는 이미 '${d.message.match(/'(.+?)'/)?.[1] || ''}' 계정으로 접속 중입니다.\n한 IP당 하나의 계정만 허용됩니다.`,
        'USERNAME_TAKEN':        d.message,
        'MSG_TOO_LONG':          '메시지가 너무 깁니다.',
        'INVALID_USERNAME':      '닉네임을 입력해주세요.',
      };
      const txt = MSG[d.code] || d.message || '서버 오류가 발생했습니다.';
      // 앱이 아직 안 열렸으면 로그인 화면에 표시
      if (document.getElementById('app').style.display === 'none') {
        showLoginError(txt);
      } else {
        toast('⚠️ ' + txt, 4000);
      }
      return;
    }

    if (d.type === 'room_info') {
      for (const u of d.existing_users) {
        const pf = u.profile || {};
        profiles[u.username] = { avatar:pf.avatar||'👤', bg:pf.bgColor||BG[0], tc:pf.textColor||'#fff', pubPem:u.public_key };
        profiles[u.username]._key = await importPem(u.public_key);
      }
      refreshMembers();
    }
    else if (d.type === 'user_joined') {
      const pf = d.profile || {};
      profiles[d.username] = { avatar:pf.avatar||'👤', bg:pf.bgColor||BG[0], tc:pf.textColor||'#fff', pubPem:d.public_key };
      profiles[d.username]._key = await importPem(d.public_key);
      refreshMembers(); addSys(`${d.username} 님이 입장했습니다`);
    }
    else if (d.type === 'user_left') {
      delete profiles[d.username];
      refreshMembers(); addSys(`${d.username} 님이 퇴장했습니다`);
    }
    else if (d.type === 'message') {
      if (d.from === myUser) return;
      try {
        const myEnc = d.encrypted_messages[myUser];
        if (!myEnc) { addSys('(수신 불가 메시지)'); return; }
        const aesKey = await decAESKey(myEnc.encrypted_key, myPriv);
        const text   = await decText(myEnc, aesKey);
        addMsg({ from:d.from, text, ts:d.timestamp });
      } catch { addSys(`(${d.from} 복호화 실패)`); }
    }
  };

  ws.onclose = () => {
    if (document.getElementById('app').style.display !== 'none') {
      addSys('⚠️ 연결이 끊어졌습니다');
    }
    toast('연결 끊김');
  };
  ws.onerror = () => {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    showLoginError('❌ 서버에 연결할 수 없습니다. 서버가 실행 중인지 확인하세요.');
  };
}

// ═══════════════════════════════════
//  SEND
// ═══════════════════════════════════
async function sendMessage() {
  const inp  = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  if (text.length > MAX_CHARS) { toast(`메시지는 ${MAX_CHARS}자를 초과할 수 없습니다`); return; }

  inp.value = ''; inp.style.height = 'auto';
  updateCounter(0);
  document.getElementById('send-btn').classList.remove('act');

  addMsg({ from:myUser, text, ts:new Date().toISOString() });

  const aes = await genAES();
  const enc = await encText(text, aes);
  const em  = {};
  for (const [u, p] of Object.entries(profiles)) {
    if (u === myUser || !p._key) continue;
    try { em[u] = { encrypted_key: await encAESKey(aes, p._key), ...enc }; }
    catch(e) { console.warn(u, e); }
  }
  ws.send(JSON.stringify({ type:'message', encrypted_messages:em }));
}

// ═══════════════════════════════════
//  EVENTS
// ═══════════════════════════════════
function updateCounter(len) {
  const el = document.getElementById('char-counter');
  el.textContent = `${len} / ${MAX_CHARS}`;
  el.className = 'char-counter' + (len >= MAX_CHARS ? ' limit' : len >= MAX_CHARS * 0.8 ? ' warn' : '');
}

document.addEventListener('DOMContentLoaded', () => {
  generateRoomId();

  const inp = document.getElementById('msg-input');

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  inp.addEventListener('input', function () {
    // 200자 초과 입력 막기
    if (this.value.length > MAX_CHARS) this.value = this.value.substring(0, MAX_CHARS);
    updateCounter(this.value.length);
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    document.getElementById('send-btn').classList.toggle('act', this.value.trim().length > 0);
  });

  document.getElementById('username-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });
});

setInterval(() => {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ type:'ping' }));
}, 30000);
</script>
